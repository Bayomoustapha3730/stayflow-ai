services:
  api:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile

    container_name: stayflow-development
    working_dir: /workspace
    command: sleep infinity

    volumes:
      - .:/workspace:cached
      - nuget-cache:/root/.nuget/packages
      - frontend-node-modules:/workspace/frontend/node_modules

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=stayflow_ai_dev;
        Username=postgres;
        Password=postgres

      AIProvider__Provider: Development
      DevelopmentSeed__DemoPassword: ChangeMe123!

      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      CHOKIDAR_USEPOLLING: "true"

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "5243:5243"
      - "5173:5173"

  postgres:
    image: postgres:16
    container_name: stayflow-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stayflow_ai_dev

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d stayflow_ai_dev"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  nuget-cache:
  frontend-node-modules: